browserstack.userName=YOUR_BROWSERSTACK_USERNAME
browserstack.accessKey=YOUR_BROWSERSTACK_ACCESS_KEY

# bs://... hash returned by https://api-cloud.browserstack.com/app-automate/upload
browserstack.app=bs://CHANGE_ME

# Server-side Appium version; older defaults miss several W3C endpoints
browserstack.appiumVersion=2.6.0

# Default phone profile; override at runtime with -Dphone=samsung or -Dphone=xiaomi
phone=pixel

# Pick devices/OS combos from https://api-cloud.browserstack.com/app-automate/devices.json
device.pixel.name=Google Pixel 7
device.pixel.osVersion=13.0

device.samsung.name=Samsung Galaxy S22
device.samsung.osVersion=12.0

device.xiaomi.name=Xiaomi Redmi Note 11
device.xiaomi.osVersion=11.0
