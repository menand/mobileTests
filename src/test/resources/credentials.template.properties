browserstack.userName=YOUR_BROWSERSTACK_USERNAME
browserstack.accessKey=YOUR_BROWSERSTACK_ACCESS_KEY

# Server-side Appium version; older defaults miss several W3C endpoints
browserstack.appiumVersion=2.6.0

# Default platform; override at runtime with -Dplatform=ios
platform=android

# Default phone profile; override with -Dphone=samsung|xiaomi|iphone14|iphone13|iphone17|iphone17max
phone=pixel

# --- per-platform app + automation ---
# bs://... hashes returned by https://api-cloud.browserstack.com/app-automate/upload
android.platformName=android
android.automationName=UiAutomator2
android.app=bs://CHANGE_ME

ios.platformName=ios
ios.automationName=XCUITest
ios.app=bs://CHANGE_ME

# --- device profiles ---
# Pick from https://api-cloud.browserstack.com/app-automate/devices.json
device.pixel.name=Google Pixel 7
device.pixel.osVersion=13.0

device.samsung.name=Samsung Galaxy S22
device.samsung.osVersion=12.0

device.xiaomi.name=Xiaomi Redmi Note 11
device.xiaomi.osVersion=11.0

device.iphone14.name=iPhone 14
device.iphone14.osVersion=18

device.iphone13.name=iPhone 13
device.iphone13.osVersion=15

device.iphone17.name=iPhone 17
device.iphone17.osVersion=26

device.iphone17max.name=iPhone 17 Pro Max
device.iphone17max.osVersion=26
